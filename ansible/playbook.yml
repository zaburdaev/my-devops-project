---
# =============================================================================
# Ansible Playbook for Health Dashboard — CI/CD Deployment
# Author: Vitalii Zaburdaiev | DevOpsUA6
#
# This playbook is used by GitHub Actions CI/CD pipeline to deploy the
# application to the production server. It handles:
#   1. System prerequisites (git, firewall)
#   2. Docker installation & configuration
#   3. Application deployment via Docker Compose
#   4. Grafana datasource & dashboard configuration
#   5. Health checks to verify successful deployment
#
# Usage (from project root):
#   ansible-playbook -i ansible/inventory.ini ansible/playbook.yml
#
# Required variables (passed via --extra-vars or environment):
#   docker_username  — Docker Hub username for image pull
#   app_repo         — GitHub repository URL
# =============================================================================

- name: Deploy Health Dashboard
  hosts: webservers
  become: yes

  vars:
    app_dir: /opt/health-dashboard
    app_repo: "https://github.com/zaburdaev/my-devops-project.git"
    docker_compose_version: "2.24.0"

  roles:
    - docker
    - app

  post_tasks:
    # --- Grafana configuration (non-critical) ---
    - name: Configure Grafana datasource and dashboards
      shell: |
        GRAFANA_ENV_FILE="{{ app_dir }}/.env" \
        GRAFANA_URL="http://localhost:3000" \
        GRAFANA_WAIT_ATTEMPTS=120 \
        GRAFANA_IMPORT_RETRIES=10 \
        bash {{ app_dir }}/scripts/configure_grafana.sh
      args:
        chdir: "{{ app_dir }}"
      become_user: ec2-user
      ignore_errors: yes
      tags: grafana

    # --- Final health verification ---
    - name: Verify application health (via Nginx)
      uri:
        url: "http://localhost/health"
        status_code: 200
        return_content: yes
      register: health_result
      retries: 5
      delay: 10
      until: health_result.status == 200
      tags: verify

    - name: Show deployment result
      debug:
        msg: "✅ Deployment successful! Health: {{ health_result.json | default(health_result.content) }}"
      tags: verify
