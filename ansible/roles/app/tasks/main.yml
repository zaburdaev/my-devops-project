---
# Role: app
# Deploys the Health Dashboard application using Docker Compose

- name: Create application directory
  file:
    path: "{{ app_dir }}"
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: '0755'

- name: Copy docker-compose.yml to server
  copy:
    src: ../../docker-compose.yml
    dest: "{{ app_dir }}/docker-compose.yml"
    owner: ec2-user
    group: ec2-user

- name: Copy .env file to server
  copy:
    src: ../../.env
    dest: "{{ app_dir }}/.env"
    owner: ec2-user
    group: ec2-user
    mode: '0600'

- name: Copy monitoring configs
  copy:
    src: "../../monitoring/"
    dest: "{{ app_dir }}/monitoring/"
    owner: ec2-user
    group: ec2-user

- name: Copy nginx config
  copy:
    src: "../../nginx/"
    dest: "{{ app_dir }}/nginx/"
    owner: ec2-user
    group: ec2-user

- name: Deploy application with Docker Compose
  command: docker-compose up -d
  args:
    chdir: "{{ app_dir }}"
  become_user: ec2-user

- name: Wait for application to be healthy
  uri:
    url: "http://localhost:5000/health"
    status_code: 200
  register: result
  until: result.status == 200
  retries: 10
  delay: 5
