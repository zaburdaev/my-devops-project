---
# Role: docker
# Installs Docker and Docker Compose on Amazon Linux / RHEL
# Ensures Docker service is running and ec2-user can use it

- name: Install Docker and dependencies
  yum:
    name:
      - docker
      - python3-pip
    state: present

- name: Start and enable Docker service
  systemd:
    name: docker
    state: started
    enabled: yes

- name: Add ec2-user to docker group
  user:
    name: ec2-user
    groups: docker
    append: yes

- name: Check if Docker Compose v2 plugin exists
  stat:
    path: /usr/libexec/docker/cli-plugins/docker-compose
  register: compose_plugin

- name: Check if standalone docker-compose exists
  stat:
    path: /usr/local/bin/docker-compose
  register: compose_standalone

- name: Install Docker Compose (standalone binary)
  get_url:
    url: "https://github.com/docker/compose/releases/download/v{{ docker_compose_version }}/docker-compose-linux-x86_64"
    dest: /usr/local/bin/docker-compose
    mode: '0755'
  when: not compose_plugin.stat.exists and not compose_standalone.stat.exists

- name: Verify Docker installation
  command: docker --version
  register: docker_version
  changed_when: false

- name: Print Docker version
  debug:
    msg: "Docker: {{ docker_version.stdout }}"
