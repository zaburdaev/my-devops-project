# =============================================================================
# Prometheus Configuration for Health Dashboard
# Author: Vitalii Zaburdaiev | DevOpsUA6
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alerting rules (optional)
rule_files:
  # - "alert_rules.yml"

scrape_configs:
  # Scrape the Flask application metrics endpoint
  - job_name: "flask-app"
    static_configs:
      - targets: ["app:5000"]

  # Scrape Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
