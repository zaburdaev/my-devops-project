<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Спасибо за внимание</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lato&family=Merriweather&display=swap');
.font-lato { font-family: 'Lato', 'Corbel', sans-serif; }
.font-merriweather { font-family: 'Merriweather', 'Constantia', serif; }
</style>
</head>
<body class="m-0 p-0">
<div class="relative overflow-hidden w-[1920px] h-[1080px] bg-[#0D1117] flex flex-col items-center justify-center gap-9">

  <div class="absolute top-0 left-0 w-full h-1" style="background:#58A6FF;"></div>

  <div class="border border-[#58A6FF] rounded-full px-10 py-4">
    <p class="text-3xl font-lato text-[#58A6FF] uppercase tracking-widest">Финальная защита проекта</p>
  </div>

  <h1 class="text-9xl font-bold font-lato text-[#E6EDF3] text-center">Спасибо за внимание!</h1>
  <p class="text-5xl font-merriweather text-[#8B949E]">Вопросы и ответы</p>

  <div class="w-[720px] border-t border-[#58A6FF]"></div>

  <div class="flex flex-row items-center justify-center gap-7">
    <div class="bg-[#161B22] border border-[#30363D] rounded-xl px-8 py-5 flex flex-row items-center gap-4">
      <i data-lucide="user" class="w-8 h-8 text-[#58A6FF]"></i>
      <div>
        <p class="text-3xl text-[#6E7681] font-lato">Автор</p>
        <p class="text-3xl font-bold text-[#E6EDF3] font-lato">Vitalii Zaburdaiev</p>
      </div>
    </div>
    <div class="bg-[#161B22] border border-[#30363D] rounded-xl px-8 py-5 flex flex-row items-center gap-4">
      <i data-lucide="book-open" class="w-8 h-8 text-[#58A6FF]"></i>
      <div>
        <p class="text-3xl text-[#6E7681] font-lato">Курс</p>
        <p class="text-3xl font-bold text-[#E6EDF3] font-lato">DevOpsUA6</p>
      </div>
    </div>
    <div class="bg-[#161B22] border border-[#30363D] rounded-xl px-8 py-5 flex flex-row items-center gap-4">
      <i data-lucide="github" class="w-8 h-8 text-[#58A6FF]"></i>
      <div>
        <p class="text-3xl text-[#6E7681] font-lato">GitHub</p>
        <p class="text-3xl font-bold text-[#E6EDF3] font-lato">github.com/zaburdaev/my-devops-project</p>
      </div>
    </div>
  </div>

  <p class="text-3xl text-[#8B949E] font-merriweather italic">Health Monitoring Dashboard · Final 2026</p>

  <div class="absolute bottom-0 left-0 w-full h-1" style="background:#58A6FF;"></div>

</div>
<script>lucide.createIcons();</script>

</html>
