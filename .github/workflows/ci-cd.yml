name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: ✅ Run tests
        run: |
          pytest tests/ -v --cov=app --cov-report=term-missing

  build:
    name: 🐳 Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/health-dashboard:latest
            ${{ secrets.DOCKER_USERNAME }}/health-dashboard:${{ github.sha }}

  deploy:
    name: 🚀 Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 🚀 Deploy to Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            APP_DIR="/opt/health-dashboard"
            REPO_URL="https://github.com/zaburdaev/my-devops-project.git"

            echo "🚀 Starting deployment..."

            if ! command -v git >/dev/null 2>&1; then
              echo "📦 git not found, installing..."
              if command -v yum >/dev/null 2>&1; then
                sudo yum install -y git
              elif command -v dnf >/dev/null 2>&1; then
                sudo dnf install -y git
              elif command -v apt-get >/dev/null 2>&1; then
                sudo apt-get update -y
                sudo apt-get install -y git
              else
                echo "❌ Unsupported package manager. Install git manually."
                exit 1
              fi
            fi

            sudo mkdir -p "${APP_DIR}"
            sudo chown -R "$(whoami):$(whoami)" "${APP_DIR}"

            if [ ! -d "${APP_DIR}/.git" ]; then
              echo "📦 First deployment - cloning repository..."
              git clone "${REPO_URL}" "${APP_DIR}"
            else
              echo "📥 Existing deployment - syncing repository with origin/main..."
              cd "${APP_DIR}"
              git fetch origin main
              git reset --hard origin/main
              git clean -fd
            fi

            cd "${APP_DIR}"

            echo "📝 Regenerating .env from .env.example..."
            cp -f .env.example .env

            set -a
            source ./.env
            set +a

            echo "🛑 Stopping old containers..."
            docker compose down

            echo "📥 Pulling latest images..."
            docker compose pull

            echo "🚀 Rebuilding and starting fresh containers..."
            docker compose up -d --build --force-recreate

            echo "⏳ Waiting for services to initialize..."
            sleep 30

            echo "📊 Container Status:"
            docker compose ps

            echo "🎛️ Configuring Grafana datasource and dashboard import..."
            GRAFANA_USER="${GF_SECURITY_ADMIN_USER:-admin}" \
            GRAFANA_PASSWORD="${GF_SECURITY_ADMIN_PASSWORD:-admin}" \
            bash scripts/configure_grafana.sh

            echo "✅ Running post-deploy monitoring verification..."
            bash scripts/verify_monitoring.sh

            echo "🏥 Application Health Check (via Nginx):"
            if curl -sf http://localhost/health > /dev/null 2>&1; then
              echo "✅ Application is HEALTHY (via Nginx)"
              curl -s http://localhost/health | jq '.' 2>/dev/null || curl -s http://localhost/health
            else
              echo "❌ Application health check FAILED"
              docker compose logs app --tail=20
              exit 1
            fi

            echo "✅ Deployment successful! Monitoring is configured automatically."
