name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: ✅ Run tests
        run: |
          pytest tests/ -v --cov=app --cov-report=term-missing

  build:
    name: 🐳 Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/health-dashboard:latest
            ${{ secrets.DOCKER_USERNAME }}/health-dashboard:${{ github.sha }}

  deploy:
    name: 🚀 Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 🚀 Deploy to Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/health-dashboard

            echo "📥 Pulling latest changes..."
            git pull origin main

            if [ ! -f .env ]; then
              echo "📝 Creating .env file..."
              cp .env.example .env
            fi

            echo "🛑 Stopping old containers..."
            docker compose down

            echo "🚀 Starting new containers..."
            docker compose up -d --build

            echo "⏳ Waiting 30 seconds for services to fully start..."
            sleep 30

            echo ""
            echo "📊 Container Status:"
            docker compose ps

            echo ""
            echo "🏥 Application Health Check:"
            echo "=============================="

            # Check via Nginx (main production endpoint)
            if curl -sf http://localhost/health > /dev/null 2>&1; then
              echo "✅ Application is HEALTHY (via Nginx)"
              curl -s http://localhost/health | jq '.' 2>/dev/null || curl -s http://localhost/health
            else
              echo "❌ Application health check FAILED"
              echo "Checking container logs..."
              docker compose logs app --tail=20
              exit 1
            fi

            echo "=============================="
            echo "✅ Deployment successful!"
