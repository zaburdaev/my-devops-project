name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ============================================
  # STAGE 1: Run unit tests
  # ============================================
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: ✅ Run tests
        run: |
          pytest tests/ -v --cov=app --cov-report=term-missing

  # ============================================
  # STAGE 2: Build Docker image and push to Hub
  # ============================================
  build:
    name: 🐳 Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/health-dashboard:latest
            ${{ secrets.DOCKER_USERNAME }}/health-dashboard:${{ github.sha }}

  # ============================================
  # STAGE 3: Deploy to server using Ansible
  # ============================================
  deploy:
    name: 🚀 Deploy via Ansible
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Ansible
        run: |
          pip install ansible

      - name: 🔑 Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: 📝 Generate Ansible inventory
        run: |
          cat > ansible/inventory.ini << EOF
          [webservers]
          production ansible_host=${{ secrets.SERVER_HOST }} ansible_user=${{ secrets.SERVER_USER }} ansible_ssh_private_key_file=~/.ssh/deploy_key

          [webservers:vars]
          ansible_python_interpreter=/usr/bin/python3
          EOF

      - name: 🚀 Run Ansible Playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook \
            -i ansible/inventory.ini \
            ansible/playbook.yml \
            --extra-vars "docker_username=${{ secrets.DOCKER_USERNAME }}" \
            -v

      - name: ✅ Post-deploy verification
        run: |
          echo "🔎 Verifying deployment..."
          echo ""
          echo "=== Application Health ==="
          curl -sf --max-time 15 http://${{ secrets.SERVER_HOST }}/health | python3 -m json.tool 2>/dev/null || echo "⚠️ App health check pending"
          echo ""
          echo "=== Grafana ==="
          curl -sf --max-time 10 http://${{ secrets.SERVER_HOST }}:3000/api/health || echo "⚠️ Grafana not ready yet"
          echo ""
          echo "=== Prometheus ==="
          curl -sf --max-time 10 http://${{ secrets.SERVER_HOST }}:9090/-/healthy || echo "⚠️ Prometheus not ready yet"
          echo ""
          echo "✅ Deployment complete!"
          echo "🌐 App:        http://${{ secrets.SERVER_HOST }}"
          echo "📊 Grafana:    http://${{ secrets.SERVER_HOST }}:3000"
          echo "🔥 Prometheus: http://${{ secrets.SERVER_HOST }}:9090"
