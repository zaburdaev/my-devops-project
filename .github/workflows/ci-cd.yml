# =============================================================================
# GitHub Actions CI/CD Pipeline for Health Dashboard
# Author: Vitalii Zaburdaiev | DevOpsUA6
# Triggers: push to main, pull requests
#
# Pipeline Structure:
#   1. test    → Run unit tests and linting
#   2. build   → Build and push Docker image (only on push to main)
#   3. deploy  → Deploy to server via SSH (optional, only if secrets configured)
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_HUB_USERNAME: oskalibriya
  IMAGE_NAME: health-dashboard

jobs:
  # ---------- Job 1: Run Tests ----------
  test:
    name: "✅ Run Tests"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short

      - name: Run linting
        run: |
          pip install flake8
          flake8 app/ tests/ --max-line-length=120 --exit-zero

  # ---------- Job 2: Build & Push Docker Image ----------
  build:
    name: "🐳 Build & Push Docker Image"
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------- Job 3: Deploy (optional, requires secrets) ----------
  deploy:
    name: "🚀 Deploy to Server"
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Check if deployment secrets are configured
        id: check_secrets
        run: |
          if [ -z "${{ secrets.SERVER_HOST }}" ] || [ -z "${{ secrets.SERVER_USER }}" ] || [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "⚠️ Deployment secrets not configured. Skipping deploy."
            echo "To enable deployment, add these GitHub Secrets:"
            echo "  - SERVER_HOST: Your server IP address"
            echo "  - SERVER_USER: SSH username (e.g., ec2-user)"
            echo "  - SSH_PRIVATE_KEY: Private SSH key for server access"
          else
            echo "configured=true" >> $GITHUB_OUTPUT
            echo "✅ Deployment secrets found. Proceeding with deploy."
          fi

      - name: Checkout code
        if: steps.check_secrets.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Deploy via SSH
        if: steps.check_secrets.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "🚀 Starting deployment..."

            # Install git if not present
            if ! command -v git &> /dev/null; then
              echo "📦 Installing git..."
              sudo dnf install -y git || sudo yum install -y git
            fi

            # Install Docker Buildx if not present
            if ! docker buildx version &> /dev/null; then
              echo "📦 Installing Docker Buildx..."
              sudo mkdir -p /usr/local/lib/docker/cli-plugins/
              sudo curl -SL "https://github.com/docker/buildx/releases/download/v0.21.1/buildx-v0.21.1.linux-amd64" -o /usr/local/lib/docker/cli-plugins/docker-buildx
              sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-buildx
            fi

            # Install Docker Compose plugin if not present
            if ! docker compose version &> /dev/null; then
              echo "📦 Installing Docker Compose plugin..."
              sudo mkdir -p /usr/local/lib/docker/cli-plugins/
              sudo curl -SL "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/lib/docker/cli-plugins/docker-compose
              sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
            fi

            # Create directory if it doesn't exist
            sudo mkdir -p /opt/health-dashboard

            # Check if it's first deploy (no .git directory)
            if [ ! -d "/opt/health-dashboard/.git" ]; then
              echo "📦 First deployment — cloning repository..."
              cd /opt
              sudo rm -rf /opt/health-dashboard
              sudo git clone https://github.com/${{ github.repository }}.git /opt/health-dashboard
              sudo chown -R $(whoami):$(whoami) /opt/health-dashboard
            else
              echo "🔄 Updating existing deployment..."
              cd /opt/health-dashboard
              git pull origin main
            fi

            # Go to project directory
            cd /opt/health-dashboard

            # Create .env file if it doesn't exist
            if [ ! -f ".env" ]; then
              echo "📝 Creating .env from .env.example..."
              if [ -f ".env.example" ]; then
                cp .env.example .env
              else
                echo "⚠️ .env.example not found, creating minimal .env"
                echo "FLASK_DEBUG=0" > .env
                echo "SECRET_KEY=change-me-in-production" >> .env
                echo "POSTGRES_HOST=postgres" >> .env
                echo "POSTGRES_PORT=5432" >> .env
                echo "POSTGRES_DB=health_dashboard" >> .env
                echo "POSTGRES_USER=postgres" >> .env
                echo "POSTGRES_PASSWORD=changeme" >> .env
                echo "REDIS_HOST=redis" >> .env
                echo "REDIS_PORT=6379" >> .env
              fi
            fi

            # Build and start services
            echo "🐳 Building and starting services..."
            docker compose up -d --build || { echo "❌ Failed to start containers"; exit 1; }

            # Show status
            echo "📊 Service status:"
            docker compose ps

            echo "✅ Deployment complete!"

      - name: Deployment skipped
        if: steps.check_secrets.outputs.configured != 'true'
        run: |
          echo "ℹ️ Deployment was skipped because server secrets are not configured."
          echo "This is expected for development/educational setups."
          echo ""
          echo "To enable automatic deployment:"
          echo "1. Set up an EC2 server using Terraform (terraform/ directory)"
          echo "2. Add GitHub Secrets: SERVER_HOST, SERVER_USER, SSH_PRIVATE_KEY"
          echo "3. Push to main branch to trigger deployment"
