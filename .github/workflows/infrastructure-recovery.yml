name: Infrastructure Recovery

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

env:
  AWS_REGION: eu-central-1
  KEY_NAME: my-devops-key
  SG_NAME: health-dashboard-sg
  EIP_TAG: health-dashboard-eip
  PROJECT_TAG: my-devops-project
  # Current production IP that should stay stable across recoveries
  PREFERRED_EIP: 18.197.7.122

jobs:
  recover:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🧹 Clean orphaned AWS resources and select persistent EIP
        run: |
          set -euo pipefail

          echo "=== Terminating any running/stopped project instances ==="
          INSTANCE_IDS=$(aws ec2 describe-instances \
            --filters "Name=tag:Project,Values=$PROJECT_TAG" "Name=instance-state-name,Values=running,stopped,pending,stopping" \
            --query 'Reservations[*].Instances[*].InstanceId' --output text || true)

          if [ -n "${INSTANCE_IDS:-}" ] && [ "$INSTANCE_IDS" != "None" ]; then
            aws ec2 terminate-instances --instance-ids $INSTANCE_IDS || true
            aws ec2 wait instance-terminated --instance-ids $INSTANCE_IDS || true
          fi

          echo "=== Delete old key pair and security group (safe cleanup) ==="
          aws ec2 delete-key-pair --key-name "$KEY_NAME" 2>/dev/null || true

          SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=$SG_NAME" \
            --query 'SecurityGroups[0].GroupId' --output text 2>/dev/null || true)
          if [ -n "${SG_ID:-}" ] && [ "$SG_ID" != "None" ]; then
            aws ec2 delete-security-group --group-id "$SG_ID" 2>/dev/null || true
          fi

          echo "=== Discover tagged EIPs ==="
          mapfile -t EIP_LINES < <(aws ec2 describe-addresses \
            --filters "Name=tag:Name,Values=$EIP_TAG" "Name=tag:Project,Values=$PROJECT_TAG" \
            --query 'Addresses[*].[AllocationId,PublicIp,AssociationId,InstanceId]' --output text | sort -k2)

          if [ ${#EIP_LINES[@]} -gt 0 ]; then
            printf '%s\n' "${EIP_LINES[@]}"
          else
            echo "No tagged EIPs found"
          fi

          SELECTED_ALLOC=""
          SELECTED_IP=""

          # 1) Prefer currently associated one (minimal downtime)
          for line in "${EIP_LINES[@]:-}"; do
            alloc=$(awk '{print $1}' <<< "$line")
            ip=$(awk '{print $2}' <<< "$line")
            assoc=$(awk '{print $3}' <<< "$line")
            if [ "$assoc" != "None" ] && [ -n "$assoc" ]; then
              SELECTED_ALLOC="$alloc"
              SELECTED_IP="$ip"
              break
            fi
          done

          # 2) Otherwise prefer configured target static IP if still available
          if [ -z "$SELECTED_ALLOC" ]; then
            for line in "${EIP_LINES[@]:-}"; do
              alloc=$(awk '{print $1}' <<< "$line")
              ip=$(awk '{print $2}' <<< "$line")
              if [ "$ip" = "$PREFERRED_EIP" ]; then
                SELECTED_ALLOC="$alloc"
                SELECTED_IP="$ip"
                break
              fi
            done
          fi

          # 3) Fallback: first tagged EIP
          if [ -z "$SELECTED_ALLOC" ] && [ ${#EIP_LINES[@]} -gt 0 ]; then
            SELECTED_ALLOC=$(awk '{print $1}' <<< "${EIP_LINES[0]}")
            SELECTED_IP=$(awk '{print $2}' <<< "${EIP_LINES[0]}")
          fi

          if [ -n "$SELECTED_ALLOC" ]; then
            echo "Selected reusable EIP: $SELECTED_IP ($SELECTED_ALLOC)"
            echo "RECOVERY_EIP_ALLOCATION_ID=$SELECTED_ALLOC" >> "$GITHUB_ENV"
            echo "RECOVERY_EIP_PUBLIC_IP=$SELECTED_IP" >> "$GITHUB_ENV"
          else
            echo "No reusable EIP found. Terraform will allocate one."
          fi

          # Optional cleanup: release duplicate unassociated tagged EIPs
          for line in "${EIP_LINES[@]:-}"; do
            alloc=$(awk '{print $1}' <<< "$line")
            assoc=$(awk '{print $3}' <<< "$line")
            if [ "$alloc" != "$SELECTED_ALLOC" ] && [ "$assoc" = "None" ]; then
              echo "Releasing duplicate unassociated EIP: $alloc"
              aws ec2 release-address --allocation-id "$alloc" || true
            fi
          done

      - name: 🔧 Terraform Init
        working-directory: terraform
        run: terraform init

      - name: 🚀 Terraform Apply (reuse EIP when available)
        working-directory: terraform
        run: |
          set -euo pipefail
          if [ -n "${RECOVERY_EIP_ALLOCATION_ID:-}" ]; then
            terraform apply -auto-approve -var="existing_eip_allocation_id=${RECOVERY_EIP_ALLOCATION_ID}"
          else
            terraform apply -auto-approve
          fi

      - name: 📋 Get outputs
        id: tf
        working-directory: terraform
        run: |
          echo "server_ip=$(terraform output -raw elastic_ip)" >> "$GITHUB_OUTPUT"
          terraform output -raw ssh_private_key > /tmp/ssh_key.pem
          chmod 600 /tmp/ssh_key.pem

      - name: 🔑 Update GitHub Secrets with new credentials
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          SERVER_IP: ${{ steps.tf.outputs.server_ip }}
        run: |
          set -euo pipefail
          echo -n "$SERVER_IP" | gh secret set SERVER_HOST --repo ${{ github.repository }}
          cd terraform
          terraform output -raw ssh_private_key | gh secret set SSH_PRIVATE_KEY --repo ${{ github.repository }}
          echo -n "ec2-user" | gh secret set SERVER_USER --repo ${{ github.repository }}

      - name: ⏳ Wait for instance boot (90s)
        run: sleep 90

      - name: 🚀 Deploy Application
        env:
          SERVER_IP: ${{ steps.tf.outputs.server_ip }}
          GRAFANA_USER: ${{ secrets.GRAFANA_ADMIN_USER }}
          GRAFANA_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          : "${GRAFANA_USER:=admin}"
          : "${GRAFANA_PASSWORD:=admin}"

          ssh -i /tmp/ssh_key.pem -o StrictHostKeyChecking=no -o ConnectTimeout=30 ec2-user@$SERVER_IP \
            GRAFANA_USER="$GRAFANA_USER" GRAFANA_PASSWORD="$GRAFANA_PASSWORD" 'bash -s' << 'DEPLOY_EOF'
          set -euo pipefail

          # Safety: bootstrap tools if cloud-init did not finish package install yet
          if ! command -v git >/dev/null 2>&1; then
            sudo yum install -y git
          fi
          if ! command -v docker >/dev/null 2>&1; then
            sudo yum install -y docker
            sudo systemctl enable --now docker
            sudo usermod -aG docker ec2-user
          fi

          sudo mkdir -p /opt/health-dashboard
          sudo chown ec2-user:ec2-user /opt/health-dashboard
          cd /opt/health-dashboard

          if [ -d ".git" ]; then
            git config --global --add safe.directory /opt/health-dashboard
            git fetch origin
            git checkout main
            git reset --hard origin/main
          else
            git clone https://github.com/zaburdaev/my-devops-project.git .
          fi

          cat > .env << ENVEOF
          POSTGRES_DB=health_dashboard
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres123
          DATABASE_URL=postgresql://postgres:postgres123@postgres:5432/health_dashboard
          REDIS_URL=redis://redis:6379/0
          SECRET_KEY=dev-secret-key-change-in-production
          FLASK_ENV=production
          GF_SECURITY_ADMIN_USER=$GRAFANA_USER
          GF_SECURITY_ADMIN_PASSWORD=$GRAFANA_PASSWORD
          ENVEOF

          docker compose pull --ignore-buildable || true
          docker compose up -d --build --force-recreate
          sleep 30

          GRAFANA_ENV_FILE=/opt/health-dashboard/.env bash scripts/configure_grafana.sh || true
          docker compose ps
          DEPLOY_EOF

      - name: ✅ Verify services
        env:
          SERVER_IP: ${{ steps.tf.outputs.server_ip }}
        run: |
          echo "=== Verifying services on $SERVER_IP ==="
          curl -sf --max-time 10 http://$SERVER_IP/health || true
          curl -sf --max-time 10 http://$SERVER_IP:3000/api/health || true
          curl -sf --max-time 10 http://$SERVER_IP:9090/-/healthy || true

      - name: 🧹 Cleanup
        if: always()
        run: rm -f /tmp/ssh_key.pem
