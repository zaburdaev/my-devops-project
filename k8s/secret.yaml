# Secret for Health Dashboard sensitive data
# NOTE: In production, use external secret managers (AWS Secrets Manager, Vault)
# Values below are base64 encoded examples only!
apiVersion: v1
kind: Secret
metadata:
  name: health-dashboard-secret
  namespace: health-dashboard
  labels:
    app: health-dashboard
type: Opaque
data:
  # echo -n 'admin' | base64 = YWRtaW4=
  POSTGRES_USER: YWRtaW4=
  # echo -n 'changeme' | base64 = Y2hhbmdlbWU=
  POSTGRES_PASSWORD: Y2hhbmdlbWU=
  # echo -n 'my-secret-key' | base64 = bXktc2VjcmV0LWtleQ==
  SECRET_KEY: bXktc2VjcmV0LWtleQ==
