# Secret for Health Dashboard sensitive data
# NOTE: In production, use external secret managers (AWS Secrets Manager, Vault)
# Values below are base64 encoded examples only!
apiVersion: v1
kind: Secret
metadata:
  name: health-dashboard-secret
  namespace: health-dashboard
  labels:
    app: health-dashboard
type: Opaque
data:
  # echo -n 'CHANGE_ME_POSTGRES_USER' | base64 = Q0hBTkdFX01FX1BPU1RHUkVTX1VTRVI=
  POSTGRES_USER: Q0hBTkdFX01FX1BPU1RHUkVTX1VTRVI=
  # echo -n 'CHANGE_ME_POSTGRES_PASSWORD' | base64 = Q0hBTkdFX01FX1BPU1RHUkVTX1BBU1NXT1JE
  POSTGRES_PASSWORD: Q0hBTkdFX01FX1BPU1RHUkVTX1BBU1NXT1JE
  # echo -n 'CHANGE_ME_SECRET_KEY' | base64 = Q0hBTkdFX01FX1NFQ1JFVF9LRVk=
  SECRET_KEY: Q0hBTkdFX01FX1NFQ1JFVF9LRVk=
