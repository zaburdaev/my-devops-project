# =============================================================================
# Docker Compose for Health Dashboard
# Author: Vitalii Zaburdaiev | DevOpsUA6
# Services: app, postgres, redis, nginx, prometheus, grafana, loki
# Usage: docker-compose up -d
# =============================================================================

version: "3.9"

services:
  # ---------- Flask Application ----------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: health-dashboard
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------- PostgreSQL Database ----------
  postgres:
    image: postgres:15-alpine
    container_name: health-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-healthdb}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-healthdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Redis Cache ----------
  redis:
    image: redis:7-alpine
    container_name: health-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Nginx Reverse Proxy ----------
  nginx:
    image: nginx:alpine
    container_name: health-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - app-network

  # ---------- Prometheus ----------
  prometheus:
    image: prom/prometheus:latest
    container_name: health-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - app-network

  # ---------- Grafana ----------
  grafana:
    image: grafana/grafana:latest
    container_name: health-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - app-network

  # ---------- Loki (Log Aggregation) ----------
  loki:
    image: grafana/loki:2.9.0
    container_name: health-loki
    restart: unless-stopped
    volumes:
      - ./monitoring/loki-config.yaml:/etc/loki/loki-config.yaml:ro
    command: -config.file=/etc/loki/loki-config.yaml
    ports:
      - "3100:3100"
    networks:
      - app-network

# ---------- Volumes ----------
volumes:
  postgres-data:
  redis-data:
  grafana-data:

# ---------- Networks ----------
networks:
  app-network:
    driver: bridge
